name: Toolchain Freshness

on:
  schedule:
    - cron: "23 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  yt-dlp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Check latest yt-dlp release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/check-yt-dlp-release.mjs

      - name: Check tool source URLs
        run: node scripts/check-tool-source-urls.mjs
