name: Toolchain Discovery

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: toolchain-discover
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Create bot token
        id: app_token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349
        with:
          app-id: ${{ secrets.TOOLCHAIN_BOT_APP_ID }}
          private-key: ${{ secrets.TOOLCHAIN_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve weekly candidate
        id: update
        env:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          set -euo pipefail
          summary="$(node scripts/update-toolchain.mjs)"
          printf '%s\n' "$summary"
          printf 'changed=%s\n' "$(jq -r '.changed' <<<"$summary")" >> "$GITHUB_OUTPUT"
          printf 'revision=%s\n' "$(jq -r '.revision' <<<"$summary")" >> "$GITHUB_OUTPUT"
          printf 'sources=%s\n' "$(jq -r '.updatedSources | join(", ")' <<<"$summary")" >> "$GITHUB_OUTPUT"

      - name: Test candidate
        if: steps.update.outputs.changed == 'true'
        run: npm test

      - name: Build candidate
        if: steps.update.outputs.changed == 'true'
        run: npm run build

      - name: Verify candidate source URLs
        if: steps.update.outputs.changed == 'true'
        run: node scripts/check-tool-source-urls.mjs

      - name: Push weekly candidate branch
        if: steps.update.outputs.changed == 'true'
        env:
          APP_SLUG: ${{ steps.app_token.outputs['app-slug'] }}
        run: |
          set -euo pipefail
          branch="bot/toolchain-weekly"
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_SLUG}[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add toolchain-lock.json src-tauri/tools-manifest.json TOOLCHAIN_CHANGELOG.md
          git commit -m "chore: update toolchain candidate" -m "chore: 更新工具链候选版本"
          git fetch --prune origin "+refs/heads/${branch}:refs/remotes/origin/${branch}" || true
          git push --force-with-lease origin "HEAD:refs/heads/${branch}"

      - name: Create or update weekly pull request
        if: steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          REVISION: ${{ steps.update.outputs.revision }}
          UPDATED_SOURCES: ${{ steps.update.outputs.sources }}
        run: |
          set -euo pipefail
          branch="bot/toolchain-weekly"
          body_file="$RUNNER_TEMP/toolchain-weekly.md"
          printf '## Toolchain candidate\n\n- Revision: `%s`\n- Updated sources: %s\n\nGenerated by the weekly policy resolver. Merge remains a maintainer decision.\n' \
            "$REVISION" "${UPDATED_SOURCES:-none}" > "$body_file"
          pr_number="$(gh pr list --repo "$GH_REPO" --base main --head "$branch" --state open --json number --jq '.[0].number // ""')"
          if [ -z "$pr_number" ]; then
            gh pr create --repo "$GH_REPO" --base main --head "$branch" \
              --title "chore: update toolchain to ${REVISION}" --body-file "$body_file"
          else
            gh pr edit "$pr_number" --repo "$GH_REPO" \
              --title "chore: update toolchain to ${REVISION}" --body-file "$body_file"
          fi

      - name: Close redundant weekly pull request
        if: steps.update.outputs.changed != 'true'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          pr_number="$(gh pr list --repo "$GH_REPO" --base main --head bot/toolchain-weekly --state open --json number --jq '.[0].number // ""')"
          if [ -n "$pr_number" ]; then
            gh pr close "$pr_number" --repo "$GH_REPO" \
              --comment "The latest policy resolution matches main, so this candidate is redundant."
          fi
